services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horizon-savoir-api
    restart: unless-stopped
    environment:
      API_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: horizon_savoir
      DB_USER: horizon_user
      DB_PASSWORD: horizon_pass
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: horizon-savoir-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: horizon_savoir
      MYSQL_USER: horizon_user
      MYSQL_PASSWORD: horizon_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: horizon-savoir-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "8081:80"

volumes:
  mysql_data: